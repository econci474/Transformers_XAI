# bmfm_gwas_regression_finetuning.yaml
# ======================================
# Hydra config for BMFM-DNA-SNP fine-tuning on signed GWAS z-score regression.
#
# Extends: dna_finetune_train_and_test_config (from BMFM package defaults)
# Overrides: label_columns → regression, loss → MSE, sequence length → 1001 bp
#
# Input data (train.csv / dev.csv / test.csv) was generated by:
#   prepare_bmfm_gwas_regression_inputs.py
# Format: sequence,z_score,seq_id
#   EA row → +z  (effect allele sequence carries the AD risk allele)
#   OA row → -z  (other allele sequence carries the protective allele)
#
# Usage (on HPC, inside conda env with bmfm_targets installed):
#   bmfm-targets-run --config-path $(pwd) -cn bmfm_gwas_regression_finetuning \
#       input_directory=$INPUT_DIRECTORY \
#       output_directory=$OUTPUT_DIRECTORY \
#       checkpoint=ibm-research/biomed.dna.snp.modernbert.113m.v1

defaults:
  - dna_finetune_train_and_test_config   # base DNA fine-tuning config from BMFM
  - _self_                               # allow this file to override defaults

# ── Dataset ───────────────────────────────────────────────────────────────────
dataset_name: gwas_regression

data_module:
  max_length: 1001           # 500 bp each side + SNP = 1001 bp window
  dataset_kwargs:
    processed_data_source: ${input_directory}
    dataset_name: ${dataset_name}
    label_dict_path: null    # not used for regression (classification only)

# ── Label: signed z-score (regression) ───────────────────────────────────────
label_columns:
  - _target_: bmfm_targets.config.LabelColumnInfo
    label_column_name: "z_score"
    is_regression_label: true

# ── Training ──────────────────────────────────────────────────────────────────
trainer:
  learning_rate: ${learning_rate}
  losses:
    - name: mse
      label_column_name: z_score

# ── Hyperparameters ───────────────────────────────────────────────────────────
# Dataset is small (~860 rows); more epochs compensate for limited data.
batch_size: 16
max_epochs: 50
learning_rate: 1.0e-5
accumulate_grad_batches: 4    # effective batch = 16 * 4 = 64
val_check_interval: 1.0       # validate once per epoch (small dataset)
accelerator: gpu
